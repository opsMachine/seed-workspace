# Scan every push and PR for hardcoded secrets (working tree + full git history).
# https://github.com/gitleaks/gitleaks-action
#
# Disabled — pre-commit hook (scripts/install-git-hooks.sh) is the primary check.
# Re-enable by restoring the `on:` block below.

name: Secret scan

on:
  workflow_dispatch:  # manual trigger only

# on:
#   push:
#     branches: [main, master]
#   pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.24.2"
